<meta name="viewport" content="width=device-width, initial-scale=1">	
<style>

}

*, *::before, *::after {
	box-sizing: border-box;
}

@keyframes rotate {
	100% {
		transform: rotate(1turn);
	}
}

@keyframes rotate-reverse {
	100% {
		transform: rotate(-1turn);
	}
}

.rainbow {
	position: relative;
	z-index: 0;
	width: 300px;
	height: 155px;
	border-radius: 1px;
	overflow: hidden;
	padding: 1rem;

  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: 150;
  font-size: 80px;
  text-align: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
  
	&::before {
		content: '';
		position: absolute;
		z-index: -2;
		left: -50%;
		top: -50%;
		width: 200%;
		height: 200%;
		background-color: #2abe52;
		background-repeat: no-repeat;
		background-size: 50% 50%, 50% 50%;
		background-position: 0 0, 100% 0, 100% 100%, 0 100%;
		background-image: 
      linear-gradient(#4fe978, #229240),
      linear-gradient(#f5c651, #d49a07),
      linear-gradient(#d53e33, #d53e33), 
      linear-gradient(#508cfa, #1048b1);
		animation: rotate 4s linear infinite;
	}
	
	&::after {
		content: '';
		position: absolute;
		z-index: -1;
		left: 10px;
		top: 10px;
		width: calc(100% - 20px);
		height: calc(100% - 20px);
		background: white;
		border-radius: 5px;
	}

  &:hover {
    &::before {
      animation-name: rotate-reverse;
    }
  }
}
</style>
</head>
